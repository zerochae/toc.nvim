<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="640" viewBox="0 0 1280 640" role="img" aria-label="toc.nvim">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2A2E36"/>
      <stop offset="1" stop-color="#21252B"/>
    </linearGradient>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#A9CE8B"/>
      <stop offset="1" stop-color="#7BA85C"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#C678DD" stop-opacity="0.20"/>
      <stop offset="1" stop-color="#C678DD" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1280" height="640" fill="url(#bg)"/>
  <circle cx="900" cy="250" r="260" fill="url(#glow)"/>

  <!-- faint watermark mark, upper-right -->
  <g transform="translate(1000,70) scale(6.4)" opacity="0.05">
    <rect x="13" y="12" width="2.4" height="34" rx="1.2" fill="#A9CE8B"/>
    <rect x="10" y="12" width="30" height="4" rx="2" fill="#A9CE8B"/>
    <rect x="23" y="23" width="24" height="4" rx="2" fill="#A9CE8B"/>
    <rect x="23" y="35" width="18" height="4" rx="2" fill="#A9CE8B"/>
    <rect x="23" y="43" width="20" height="4" rx="2" fill="#A9CE8B"/>
  </g>

  <!-- main lockup, centered -->
  <g transform="translate(322,258)">
    <g transform="scale(2.6)">
      <rect x="13" y="12" width="2.4" height="34" rx="1.2" fill="url(#g)"/>
      <rect x="10" y="12" width="30" height="4" rx="2" fill="url(#g)"/>
      <path d="M14.2 25 h6" stroke="url(#g)" stroke-width="2.4" stroke-linecap="round" fill="none"/>
      <rect x="23" y="23" width="24" height="4" rx="2" fill="url(#g)"/>
      <path d="M14.2 37 h6" stroke="url(#g)" stroke-width="2.4" stroke-linecap="round" fill="none"/>
      <rect x="23" y="35" width="18" height="4" rx="2" fill="url(#g)"/>
      <path d="M14.2 45 h6" stroke="url(#g)" stroke-width="2.4" stroke-linecap="round" fill="none"/>
      <rect x="23" y="43" width="20" height="4" rx="2" fill="#C678DD"/>
      <circle cx="50" cy="45" r="4.5" fill="#C678DD"/>
    </g>
    <text x="188" y="112" font-family="'SF Mono', 'Menlo', 'DejaVu Sans Mono', monospace" font-size="96" font-weight="700" letter-spacing="-4">
      <tspan fill="#98C379">toc</tspan><tspan fill="#8B9284">.nvim</tspan>
    </text>
  </g>

</svg>
